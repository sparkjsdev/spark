<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Spark • Splat Reveal Effects</title>
  <style>
    body {
      margin: 0;
    }
    canvas {
      touch-action: none;
    }
  </style>
</head>

<body>
  <script type="importmap">
    {
      "imports": {
        "three": "/examples/js/vendor/three/build/three.module.js",
        "lil-gui": "/examples/js/vendor/lil-gui/dist/lil-gui.esm.js",
        "@sparkjsdev/spark": "/dist/spark.module.js"
      }
    }
  </script>
  <script type="module">
    import * as THREE from "three";
    import { SparkControls, SplatMesh, dyno } from "@sparkjsdev/spark";
    import { getAssetFileURL } from "/examples/js/get-asset-url.js";
    import GUI from "lil-gui";

    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
    
    // Initialize camera with elevated perspective
    camera.position.set(0, 2, 2.5);
    camera.lookAt(0, 0, 0);
    
    const renderer = new THREE.WebGLRenderer();
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    window.addEventListener('resize', onWindowResize, false);
    function onWindowResize() {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    }

    // Animation timing variables
    const animateT = dyno.dynoFloat(0);
    let baseTime = 0;
    let splatLoaded = false;
    
    // Camera orbit parameters
    let cameraAngle = 0;
    const cameraRadius = 3;
    const cameraHeight = 2;
    const rotationSpeed = 0.2;

    // Available visual effects configuration
    const effectParams = {
      effect: "Magic",
      /** World-space grid divisions per unit; lower = larger blocks */
      blocksGridDensity: 4
    };

    const blocksGridDensityDyno = dyno.dynoFloat(effectParams.blocksGridDensity);

    let splatMesh = null;

      /**
       * Loads and configures splat mesh based on selected effect
       * @param {string} effect - The effect type (Magic, Spread, Unroll, Twister, or Rain)
       */
    async function loadSplatForEffect(effect) {
      // Clean up existing splat mesh
      if (splatMesh) {
        scene.remove(splatMesh);
        splatMesh = null;
      }

      // Configure splat file and positioning per effect
      let splatFileName, position;
      if (effect === "Blocks") {
        splatFileName = "painted-bedroom.spz";
        position = [0, 0, 0];
      } else if (effect === "Magic") {
        splatFileName = "primerib-tamos.spz";
        position = [0, 0, 0];
      } else if (effect === "Spread") {
        splatFileName = "valley.spz";
        position = [0, 1, 1];
              } else if (effect === "Unroll") {
          splatFileName = "burger-from-amboy.spz";
          position = [0, 0, 0];
      } else if (effect === "Twister" || effect === "Rain") {
        splatFileName = "sutro.zip";
        position = [0, -1, 1];
      } else if (effect === "Fire") {
        splatFileName = "cat.spz";
        position = [0, -1, 0];
      }

      // Load and initialize new splat mesh
      const splatURL = await getAssetFileURL(splatFileName);
      splatMesh = new SplatMesh({ url: splatURL });
      splatMesh.quaternion.set(1, 0, 0, 0);
      splatMesh.position.set(position[0], position[1], position[2]);
      
              // Apply special scaling for Unroll effect
        if (effect === "Unroll") {
          splatMesh.scale.set(1.5, 1.5, 1.5);
        } else if (effect === "Twister" || effect === "Rain") {
          splatMesh.scale.set(0.8, 0.8, 0.8);
        } else if (effect === "Fire") {
          splatMesh.scale.set(0.9, 0.9, 0.9);
        } else if (effect === "Blocks") {
          splatMesh.scale.set(1, 1, 1);
        }
      
      scene.add(splatMesh);

      // Wait for fetch, decode, and GPU init before starting the effect
      splatLoaded = false;
      await splatMesh.initialized;
      splatLoaded = true;
      baseTime = 0;

      // Apply visual effects to the loaded splat
      setupSplatModifier();
    }

    // Initialize user interface
    const gui = new GUI();
    const effectFolder = gui.addFolder('Effects');
    
          // Effect selector dropdown
      effectFolder.add(effectParams, 'effect', ['Blocks', 'Magic', 'Spread', 'Unroll', 'Twister', 'Rain', 'Fire'])
        .name('Effect Type')
        .onChange(async () => {
          await loadSplatForEffect(effectParams.effect);
        });
    
    // Animation controls
    const guiControls = {
      resetTime: () => {
        baseTime = 0;
        animateT.value = 0;
      }
    };
    effectFolder.add(guiControls, 'resetTime').name('Reset Time');
    effectFolder.add(effectParams, 'blocksGridDensity', 1, 6, 0.5)
      .name('Blocks grid density');
    effectFolder.open();
    if (window.matchMedia('(max-width: 768px)').matches) {
      gui.close();
    }

    /**
     * Configures visual effects shader for the current splat mesh
     */
    function setupSplatModifier() {
      splatMesh.objectModifier = dyno.dynoBlock(
      { gsplat: dyno.Gsplat },
      { gsplat: dyno.Gsplat },
      ({ gsplat }) => {
        const d = new dyno.Dyno({
          inTypes: { gsplat: dyno.Gsplat, t: "float", effectType: "int" },
          outTypes: { gsplat: dyno.Gsplat },
          // GLSL utility functions for effects
          globals: () => [
            dyno.unindent(`
              // Pseudo-random hash function
              vec3 hash(vec3 p) {
                p = fract(p * 0.3183099 + 0.1);
                p *= 17.0;
                return fract(vec3(p.x * p.y * p.z, p.x + p.y * p.z, p.x * p.y + p.z));
              }

              float hashFloat(vec3 p) {
                p = fract(p * 0.3183099 + 0.1);
                p *= 17.0;
                return fract(p.x * p.y * p.z + p.x + p.y * p.z);
              }
              vec2 hash2Block(vec3 p) {
                return vec2(
                  hashFloat(p + vec3(13.1, 7.7, 3.3)),
                  hashFloat(p + vec3(5.9, 11.3, 17.7))
                );
              }

              // 3D Perlin-style noise function
              vec3 noise(vec3 p) {
                vec3 i = floor(p);
                vec3 f = fract(p);
                f = f * f * (3.0 - 2.0 * f);
                
                vec3 n000 = hash(i + vec3(0,0,0));
                vec3 n100 = hash(i + vec3(1,0,0));
                vec3 n010 = hash(i + vec3(0,1,0));
                vec3 n110 = hash(i + vec3(1,1,0));
                vec3 n001 = hash(i + vec3(0,0,1));
                vec3 n101 = hash(i + vec3(1,0,1));
                vec3 n011 = hash(i + vec3(0,1,1));
                vec3 n111 = hash(i + vec3(1,1,1));
                
                vec3 x0 = mix(n000, n100, f.x);
                vec3 x1 = mix(n010, n110, f.x);
                vec3 x2 = mix(n001, n101, f.x);
                vec3 x3 = mix(n011, n111, f.x);
                
                vec3 y0 = mix(x0, x1, f.y);
                vec3 y1 = mix(x2, x3, f.y);
                
                return mix(y0, y1, f.z);
              }

              // 2D rotation matrix
              mat2 rot(float a) {
                float s=sin(a),c=cos(a);
                return mat2(c,-s,s,c);
              }
              // Twister weather effect
              vec4 twister(vec3 pos, vec3 scale, float t) {
                vec3 h = hash(pos);
                float s = smoothstep(0., 8., t*t*.1 - length(pos.xz)*2.+2.);
                if (length(scale) < .05) pos.y = mix(-10., pos.y, pow(s, 2.*h.x));
                pos.xz = mix(pos.xz*.5, pos.xz, pow(s, 2.*h.x));
                float rotationTime = t * (1.0 - s) * 0.2;
                pos.xz *= rot(rotationTime + pos.y*20.*(1.-s)*exp(-1.*length(pos.xz)));
                return vec4(pos, s*s*s*s);
              }

              // Rain weather effect
              vec4 rain(vec3 pos, vec3 scale, float t) {
                vec3 h = hash(pos);
                float s = pow(smoothstep(0., 5., t*t*.1 - length(pos.xz)*2. + 1.), .5 + h.x);
                float y = pos.y;
                pos.y = min(-10. + s*15., pos.y);
                pos.xz = mix(pos.xz*.3, pos.xz, s);
                pos.xz *= rot(t*.3);
                return vec4(pos, smoothstep(-10., y, pos.y));
              }

              // Fire: jagged edge for bottom-to-top reveal
              float sawtoothNoise(vec2 p) {
                vec2 i = floor(p);
                vec2 f = fract(p);
                f = f * f * (3.0 - 2.0 * f);
                float a = dot(hash(vec3(i, 0.0)), vec3(1.0, 1.0, 1.0)) - 0.5;
                float b = dot(hash(vec3(i + vec2(1,0), 0.0)), vec3(1.0, 1.0, 1.0)) - 0.5;
                float c = dot(hash(vec3(i + vec2(0,1), 0.0)), vec3(1.0, 1.0, 1.0)) - 0.5;
                float d = dot(hash(vec3(i + vec2(1,1), 0.0)), vec3(1.0, 1.0, 1.0)) - 0.5;
                return mix(mix(a, b, f.x), mix(c, d, f.x), f.y);
              }
              float jaggedWave(vec2 xz, float t) {
                float baseY = -2.5 + t * 0.35;
                float n = sawtoothNoise(xz * 8.0) * 0.5 + sawtoothNoise(xz * 24.0) * 0.25;
                return baseY + n;
              }
            `)
          ],
          // Main effect shader logic
          statements: ({ inputs, outputs }) => dyno.unindentLines(`
            ${outputs.gsplat} = ${inputs.gsplat};
            float t = ${inputs.t};
            float s = smoothstep(0.,10.,t-4.5)*10.;
            vec3 scales = ${inputs.gsplat}.scales;
            vec3 localPos = ${inputs.gsplat}.center;
            float l = length(localPos.xz);
            
            if (${inputs.effectType} == 7) {
              // Blocks: voxel fall, bounce, flash (splat-blocks)
              vec3 p = localPos;
              vec3 blockId = floor(p * ${inputs.blocksGridDensity});
              float layer = blockId.y + 20.0;
              float layerDelay = (24.0 - layer) * 0.22;
              float randomDelay = hashFloat(blockId * 1.31) * 0.65 + hashFloat(blockId.zxy * 2.17) * 0.25;
              float delay = max(layerDelay + randomDelay, 0.0);
              float localT = max(t - delay, 0.0);
              float fallDuration = 0.62;
              float fallProgress = clamp(localT / fallDuration, 0.0, 1.0);
              float fallCurve = (1.0 - fallProgress);
              float offsetY = 3.2 * fallCurve * fallCurve;
              vec2 driftN = hash2Block(blockId) * 2.0 - 1.0;
              float driftMag = 0.16 * fallCurve * fallCurve;
              vec2 drift = driftN * driftMag;
              ${outputs.gsplat}.center.x = p.x + drift.x;
              ${outputs.gsplat}.center.y = p.y - offsetY;
              ${outputs.gsplat}.center.z = p.z + drift.y;
              float bounceGate = step(fallDuration, localT);
              float bounce = exp(-(localT - fallDuration) * 4.5) * sin((localT - fallDuration) * 20.0) * 0.2 * bounceGate;
              ${outputs.gsplat}.center.y += bounce;
              float alpha = smoothstep(0.0, 0.12, localT);
              ${outputs.gsplat}.rgba.a *= alpha;
              float warm = (1.0 - fallProgress) * alpha;
              ${outputs.gsplat}.rgba.rgb = mix(${inputs.gsplat}.rgba.rgb, vec3(1.3, 0.78, 0.35), warm * 0.4);
              float landingT = max(localT - fallDuration, 0.0);
              float flashMask = exp(-landingT * 6.0) * step(fallDuration, localT);
              ${outputs.gsplat}.rgba.rgb = mix(${outputs.gsplat}.rgba.rgb, vec3(1.0), flashMask * 0.95);
              float pop = smoothstep(0.0, 0.25, localT);
              ${outputs.gsplat}.scales = scales * mix(0.72, 1.0, pop);
            } else if (${inputs.effectType} == 1) {
              // Magic Effect: Complex twister with noise and radial reveal
              float border = abs(s-l-.5);
              localPos *= 1.-.2*exp(-20.*border);
              vec3 finalScales = mix(scales,vec3(0.002),smoothstep(s-.5,s,l+.5));
              ${outputs.gsplat}.center = localPos + .1*noise(localPos.xyz*2.+t*.5)*smoothstep(s-.5,s,l+.5);
              ${outputs.gsplat}.scales = finalScales;
              float at = atan(localPos.x,localPos.z)/3.1416;
              ${outputs.gsplat}.rgba *= step(at,t-3.1416);
              ${outputs.gsplat}.rgba += exp(-20.*border) + exp(-50.*abs(t-at-3.1416))*.5;
              
            } else if (${inputs.effectType} == 2) {
              // Spread Effect: Gentle radial emergence with scaling
              float tt = t*t*.4+.5;
              localPos.xz *= min(1.,.3+max(0.,tt*.05));
              ${outputs.gsplat}.center = localPos;
              ${outputs.gsplat}.scales = max(mix(vec3(0.0),scales,min(tt-7.-l*2.5,1.)),mix(vec3(0.0),scales*.2,min(tt-1.-l*2.,1.)));
              ${outputs.gsplat}.rgba = mix(vec4(.3),${inputs.gsplat}.rgba,clamp(tt-l*2.5-3.,0.,1.));
              
            } else if (${inputs.effectType} == 3) {
              // Unroll Effect: Rotating helix with vertical reveal
              localPos.xz *= rot((localPos.y*50.-20.)*exp(-t));
              ${outputs.gsplat}.center = localPos * (1.-exp(-t)*2.);
              ${outputs.gsplat}.scales = mix(vec3(0.002),scales,smoothstep(.3,.7,t+localPos.y-2.));
              ${outputs.gsplat}.rgba = ${inputs.gsplat}.rgba*step(0.,t*.5+localPos.y-.5);
            } else if (${inputs.effectType} == 4) {
              // Twister Effect: swirling weather reveal
              vec4 effectResult = twister(localPos, scales, t);
              ${outputs.gsplat}.center = effectResult.xyz;
              ${outputs.gsplat}.scales = mix(vec3(.002), scales, pow(effectResult.w, 12.));
              float s = effectResult.w;
              // Also apply a spin (self-rotation) so each splat rotates about its own center.
              float spin = -t * 0.3 * (1.0 - s);
              vec4 spinQ = vec4(0.0, sin(spin*0.5), 0.0, cos(spin*0.5));
              ${outputs.gsplat}.quaternion = quatQuat(spinQ, ${inputs.gsplat}.quaternion);
            } else if (${inputs.effectType} == 5) {
              // Rain Effect: falling streaks
              vec4 effectResult = rain(localPos, scales, t);
              ${outputs.gsplat}.center = effectResult.xyz;
              ${outputs.gsplat}.scales = mix(vec3(.005), scales, pow(effectResult.w, 30.));
              // Also apply a spin (self-rotation) so each splat rotates about its own center.
              float spin = -t*.3;
              vec4 spinQ = vec4(0.0, sin(spin*0.5), 0.0, cos(spin*0.5));
              ${outputs.gsplat}.quaternion = quatQuat(spinQ, ${inputs.gsplat}.quaternion);
            } else if (${inputs.effectType} == 6) {
              // Fire: form splat from cloud, bottom-to-top, jagged border, white edge
              vec3 origPos = localPos;
              vec3 origRgba = ${inputs.gsplat}.rgba.rgb;
              float waveY = jaggedWave(localPos.xz, t-8.);
              float formed = 1.0 - smoothstep(waveY - 0.03, waveY + 0.03, localPos.y);
              vec3 cloudOffset = (hash(localPos) - 0.5);
              localPos = mix(origPos + normalize(origPos)* .3 * cloudOffset, origPos, formed);
              ${outputs.gsplat}.center = localPos;
              //${outputs.gsplat}.scales = mix(vec3(0.001), scales, formed);
              float distToEdge = abs(localPos.y - waveY);
              float atBorder = smoothstep(0.12, 0.02, distToEdge);
              vec3 finalRgb = mix(origRgba*min(1.,distToEdge*.75), vec3(2.0, 0.5, 0.2), atBorder*1.2);
              ${outputs.gsplat}.rgba.rgb = finalRgb;
              ${outputs.gsplat}.scales = mix(vec3(0.005), scales, pow(formed, 1.5));
              ${outputs.gsplat}.rgba.a *= pow(formed, 0.25);
            }
          `),
        });

        // Map effect names to shader integer constants
        const effectType = effectParams.effect === "Blocks" ? 7 :
                          effectParams.effect === "Magic" ? 1 : 
                          effectParams.effect === "Spread" ? 2 : 
                          effectParams.effect === "Unroll" ? 3 : 
                          effectParams.effect === "Twister" ? 4 : 
                          effectParams.effect === "Rain" ? 5 : 6;
        
        gsplat = d.apply({ 
          gsplat, 
          t: animateT,
          effectType: dyno.dynoInt(effectType),
          blocksGridDensity: blocksGridDensityDyno
        }).gsplat;
        
        return { gsplat };
      }
    );

      // Apply shader modifications to splat mesh
      splatMesh.updateGenerator();
    }

    // Initialize with default effect
    await loadSplatForEffect(effectParams.effect);

    // Initialize camera controls and start render loop
    const controls = new SparkControls({ canvas: renderer.domElement });
    
    renderer.setAnimationLoop(function animate(time) {
      // Update animation timing
      if (splatLoaded) {
        baseTime += 1/60;
        animateT.value = baseTime;
        blocksGridDensityDyno.value = effectParams.blocksGridDensity;
      } else {
        animateT.value = 0;
      }
      
      if (splatLoaded) {
        if (effectParams.effect === "Blocks") {
          camera.fov = 85;
          camera.updateProjectionMatrix();
          camera.position.set(-1, 0, -2);
          camera.lookAt(10, 0, -10);
        } else {
          camera.fov = 60;
          camera.updateProjectionMatrix();
          // Orbit camera only for non-weather effects
          cameraAngle += rotationSpeed * (1/120);
          if (effectParams.effect == "Twister" || effectParams.effect == "Rain") cameraAngle = 0;
          camera.position.x = Math.cos(cameraAngle) * cameraRadius;
          camera.position.z = Math.sin(cameraAngle) * cameraRadius;
          camera.position.y = cameraHeight;
          // Adjust camera target based on current effect
          if (effectParams.effect === "Spread") {
            camera.lookAt(0, 1, 0);
          } else if (effectParams.effect === "Fire") {
            camera.lookAt(0, 0.3, 0);
          } else {
            camera.lookAt(0, 0, 0);
          }
        }
      }
      
      // Update splat rendering if available
      if (splatMesh) {
        splatMesh.updateVersion();
      }
      
      controls.update(camera);
      renderer.render(scene, camera);
    });
  </script>
</body>

</html>
