name: Deploy to Azure Static Web Apps

on:
  push:
    branches:
      - main
      - feature/azure_hosting
    paths:
      - 'src/**'
      - 'examples/**'
      - 'docs/**'
      - 'index.html'
      - 'package.json'

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    name: Build and Deploy

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Build WASM (if needed)
        run: |
          if command -v rustup &> /dev/null; then
            npm run build:wasm
          else
            echo "Rust not available, using pre-built WASM"
          fi

      - name: Install MkDocs
        run: pip install mkdocs-material

      - name: Build site
        run: npm run site:build

      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_NICE_MEADOW_018297C00 }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
          skip_app_build: true
          skip_api_build: true
          app_location: "site"
          output_location: ""
